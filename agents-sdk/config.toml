skills = []
max_turns_tier1 = 20
max_turns_tier2 = 30
max_budget_usd = 0.00
schedule = "Sunday 22:00"
stale_days = 30

[agents.pr_digest]
enabled = false
skills = ["vault-read-write"]
max_turns = 15
max_budget_usd = 0.00
schedule = "08:00"
repos = ["seanwinslow28/16BitFit-V3", "seanwinslow28/sprite-sheet-automation-2026", "seanwinslow28/claude-code-superuser-pack"]
target_machine = "macbook_pro"

[agents.meta_agent]
enabled = true
skills = ["vault-read-write"]
max_turns = 10
max_budget_usd = 0.10
schedule = "06:30"
target_machine = "mac_mini"

[agents.health_audit]
enabled = false
skills = ["health-habits", "vault-read-write"]

[agents.md_to_anki]
enabled = false
skills = ["vault-read-write"]

[safety]
max_turns_default = 30
max_budget_default = 0.50
