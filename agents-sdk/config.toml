# ─── Operating-Model Artifact Wiring (Phase 1, 2026-04-23) ─────────────
# Feeds vault/05_atlas/operating-models/{domain}/{kind}.md content into
# agent prompts. Global kill-switch: set enabled=false to disable for all
# agents without code changes. See docs/agent-wiring-plan for context.

[artifacts]
enabled = true
vault_subpath = "05_atlas/operating-models"
cache_mtime_check = true
require_confirmed = true

[artifacts.per_agent]
# daily-driver (cloud): HEARTBEATs always-on; USER/SOUL/schedule-recs/
# operating-model listed as Read-tool targets. Life-systems USER.md
# cloud-egress accepted per 2026-04-23 decision.
daily_driver = { heartbeats = true, on_demand = ["USER", "SOUL", "operating-model", "schedule-recommendations"] }

# Phase 2 placeholders — populated when those agents are wired up.
# meta_agent    = { on_demand = ["schedule-recommendations"] }
# flush         = { on_demand = ["SOUL"] }
# knowledge_lint = { on_demand = ["SOUL"] }

# ─── Three-Machine Routing ───────────────────────────────────────────

[routing]
health_check_timeout_secs = 3
health_check_interval_secs = 60
fallback_to_api = true

[routing.machines.mac_mini]
host = "192.168.68.200"
port = 11434
tier = 1
runtime = "ollama"
always_on = true
models = ["phi4-mini-reasoning", "phi4-mini", "nomic-embed-text", "gemma4:e4b"]

[routing.machines.macbook_pro]
# v3.14.3 (2026-04-18): Mac Mini is the always-on agent driver. WOL path
# dropped — scheduled agents run on the Mac Mini and no enabled agent wakes
# the MBP. Host stays at MBP's LAN IP so that any cross-machine call (e.g.
# the still-enabled vault_synthesizer hitting MBP when it happens to be up,
# or ad-hoc benchmarking) hits the right machine. When MBP is asleep the
# call fails health-check → falls back to Claude API or errors cleanly.
host = "192.168.68.50"
port = 1234
tier = 2
runtime = "lm-studio"
always_on = false
models = ["qwen3-14b", "qwen2.5-coder-32b-instruct", "google/gemma-4-31b"]

[routing.machines.alienware]
host = "192.168.68.201"
port = 11434
tier = 3
runtime = "ollama"
always_on = false
wol_mac = "B4:E9:B8:F7:71:47"
models = ["Qwen3-VL-7B"]

# Task → model → machine mapping
[routing.task_map]
# inbox_triage swapped 2026-04-18 (Phase 6 A.7): gemma4:e4b beat phi4-mini-
# reasoning +7.5pp quality / +57% p50 speedup on the N=20 golden set. Both
# stay on Mac Mini via Ollama — no MBP dependency.
inbox_triage = { model = "gemma4:e4b", machine = "mac_mini" }
vault_embeddings = { model = "nomic-embed-text", machine = "mac_mini" }
anki_cards = { model = "phi4-mini", machine = "mac_mini" }
# financial_analysis rerouted 2026-04-18 (v3.14.3): Mac Mini is now the
# always-on agent driver. qwen3-14b @ MBP would fail whenever MBP sleeps.
# phi4-mini-reasoning @ mac_mini scored q=0.900 on this task in the N=20
# Mac Mini benchmark — matches the prior incumbent's quality while staying
# entirely on the always-on host. No MBP dependency.
financial_analysis = { model = "phi4-mini-reasoning", machine = "mac_mini" }
# code_review stays routed to MBP pending scorer fix: both models scored
# below 0.2 in MBP run / literally 0.000 in Mac Mini run, which points at
# the Jaccard extractor (expects hyphenated tags vs prose output) rather
# than at the models. When the extractor is fixed, re-bench and decide.
code_review = { model = "qwen2.5-coder-32b-instruct", machine = "macbook_pro" }
heavy_synthesis = { model = "qwen3-14b", machine = "macbook_pro" }
vault_synthesis = { model = "qwen3-14b", machine = "macbook_pro" }  # Phase 6 D.2 — model resolved at runtime via this key
sprite_vision_qa = { model = "Qwen3-VL-7B", machine = "alienware" }
comfyui_orchestration = { model = "none", machine = "alienware" }

# ─── Notifications ───────────────────────────────────────────────────────────

[notifications]
provider = "pushover"
# Pushover user key (identifies Sean's account / sean-phone device)
# Stored in macOS Keychain — retrieve via: lib/keychain.py get pushover_user_key
pushover_user_key_keychain = "pushover_user_key"
# App/API token — stored in macOS Keychain (never commit plaintext tokens)
# Retrieve via: lib/keychain.py get pushover_app_token
pushover_app_token_keychain = "pushover_app_token"
# Events that trigger a push. `wol_failure` removed in v3.14.3 — Mac Mini
# is the always-on agent driver; no agent wakes the MBP anymore.
notify_on = ["agent_error", "gate_check_fail"]
