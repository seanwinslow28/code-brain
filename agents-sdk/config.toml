# ─── Operating-Model Artifact Wiring (Phase 1, 2026-04-23) ─────────────
# Feeds vault/05_atlas/operating-models/{domain}/{kind}.md content into
# agent prompts. Global kill-switch: set enabled=false to disable for all
# agents without code changes. See docs/agent-wiring-plan for context.

[artifacts]
enabled = true
vault_subpath = "05_atlas/operating-models"
cache_mtime_check = true
require_confirmed = true

[artifacts.per_agent]
# daily-driver (cloud): HEARTBEATs always-on; USER/SOUL/schedule-recs/
# operating-model listed as Read-tool targets. Life-systems USER.md
# cloud-egress accepted per 2026-04-23 decision.
daily_driver = { heartbeats = true, on_demand = ["USER", "SOUL", "operating-model", "schedule-recommendations"] }

# Phase 2 (2026-04-27, v3.17.0): all three agents call local Ollama only —
# no cloud egress of SOUL or schedule-recommendations content. meta_agent
# routes to gemma4:e4b on Mac Mini for the domain-aware insights summary.
meta_agent     = { on_demand = ["schedule-recommendations"] }
flush          = { on_demand = ["SOUL"] }
knowledge_lint = { on_demand = ["SOUL"] }

# process-inbox (cloud, 2026-04-28; on-demand dropped 2026-04-29):
# 3 domain HEARTBEATs always-on for domain routing decisions. on-demand
# SOUL/operating-model pointers were dropped after 2026-04-29 first-fire
# burned $1.23 / 30 turns moving zero files — the agent over-read those
# pointers before touching the inbox. HEARTBEATs alone give 80% of the
# routing value at 30% of the cost. The research-candidate flag rule
# (in build_artifact_preamble) carries forward without needing the
# on-demand artifact bodies inline.
process_inbox  = { heartbeats = true }

# ─── Three-Machine Routing ───────────────────────────────────────────

[routing]
health_check_timeout_secs = 3
health_check_interval_secs = 60
fallback_to_api = true

[routing.machines.mac_mini]
host = "192.168.68.200"
port = 11434
tier = 1
runtime = "ollama"
always_on = true
models = ["phi4-mini-reasoning", "phi4-mini", "nomic-embed-text", "gemma4:e4b"]

[routing.machines.macbook_pro]
# v3.14.3 (2026-04-18): Mac Mini is the always-on agent driver. WOL path
# dropped — scheduled agents run on the Mac Mini and no enabled agent wakes
# the MBP. Host stays at MBP's LAN IP so that any cross-machine call (e.g.
# the still-enabled vault_synthesizer hitting MBP when it happens to be up,
# or ad-hoc benchmarking) hits the right machine. When MBP is asleep the
# call fails health-check → falls back to Claude API or errors cleanly.
# 2026-05-23: switched from hardcoded IP (was 192.168.68.50, drifted to .53)
# to mDNS hostname so DHCP rotation doesn't break the synth health check.
# Adds ~100ms per resolution; negligible vs the 60s health-check interval.
host = "seans-macbook-pro.local"
port = 1234
tier = 2
runtime = "lm-studio"
always_on = false
models = ["qwen3-14b", "qwen2.5-coder-32b-instruct", "google/gemma-4-31b"]

[routing.machines.alienware]
host = "192.168.68.201"
port = 11434
tier = 3
runtime = "ollama"
always_on = false
wol_mac = "B4:E9:B8:F7:71:47"
# Directed broadcast for the LAN. The Deco BE63 mesh uses a /22 netmask
# (192.168.68.0/22), so the correct directed broadcast is 192.168.71.255
# — NOT 192.168.68.255 (which is a unicast address on /22). Discovered
# 2026-05-24 via Topic 20 Phase 2 troubleshooting; `255.255.255.255`
# limited broadcasts were silently dropped somewhere in the Deco backbone.
wol_broadcast = "192.168.71.255"
models = ["qwen3-vl:8b"]

# Task → model → machine mapping
[routing.task_map]
# inbox_triage swapped 2026-04-18 (Phase 6 A.7): gemma4:e4b beat phi4-mini-
# reasoning +7.5pp quality / +57% p50 speedup on the N=20 golden set. Both
# stay on Mac Mini via Ollama — no MBP dependency.
inbox_triage = { model = "gemma4:e4b", machine = "mac_mini" }
vault_embeddings = { model = "nomic-embed-text", machine = "mac_mini" }
anki_cards = { model = "phi4-mini", machine = "mac_mini" }
# financial_analysis rerouted 2026-04-18 (v3.14.3): Mac Mini is now the
# always-on agent driver. qwen3-14b @ MBP would fail whenever MBP sleeps.
# phi4-mini-reasoning @ mac_mini scored q=0.900 on this task in the N=20
# Mac Mini benchmark — matches the prior incumbent's quality while staying
# entirely on the always-on host. No MBP dependency.
financial_analysis = { model = "phi4-mini-reasoning", machine = "mac_mini" }
# code_review stays routed to MBP pending scorer fix: both models scored
# below 0.2 in MBP run / literally 0.000 in Mac Mini run, which points at
# the Jaccard extractor (expects hyphenated tags vs prose output) rather
# than at the models. When the extractor is fixed, re-bench and decide.
code_review = { model = "qwen2.5-coder-32b-instruct", machine = "macbook_pro" }
heavy_synthesis = { model = "qwen3-14b", machine = "macbook_pro" }
vault_synthesis = { model = "qwen3-14b", machine = "macbook_pro" }  # Phase 6 D.2 — model resolved at runtime via this key
job_scoring = { model = "qwen3-14b", machine = "macbook_pro" }
deep_research = { model = "qwen3-14b-research", machine = "mac_mini" }  # Phase 5 (2026-04-26) → Mac Mini migration v3.23.0 (2026-05-02): routed via LDR HTTP at :5050, custom Modelfile tag with /no_think baked into TEMPLATE
sprite_vision_qa = { model = "Qwen3-VL-7B", machine = "alienware" }
comfyui_orchestration = { model = "none", machine = "alienware" }

# ─── Notifications ───────────────────────────────────────────────────────────

[notifications]
provider = "pushover"
# Pushover user key (identifies Sean's account / sean-phone device)
# Stored in macOS Keychain — retrieve via: lib/keychain.py get pushover_user_key
pushover_user_key_keychain = "pushover_user_key"
# App/API token — stored in macOS Keychain (never commit plaintext tokens)
# Retrieve via: lib/keychain.py get pushover_app_token
pushover_app_token_keychain = "pushover_app_token"
# Events that trigger a push. `wol_failure` removed in v3.14.3 — Mac Mini
# is the always-on agent driver; no agent wakes the MBP anymore.
notify_on = ["agent_error", "gate_check_fail"]

# ─── Knowledge-Loop Consumer Activation (Phase B, 2026-04-25) ──────────
# Read by `.claude/hooks/session-start-inject-index.sh` to gate the
# SessionStart `additionalContext` injection of vault/knowledge/index.md.
# Setting `inject_on_session_start = false` is an instant rollback — the
# hook can also be removed from `.claude/settings.json` SessionStart for
# a code-level rollback. Independent of `[artifacts]` above.

[knowledge_index]
inject_on_session_start = true
max_chars = 15000
path = "vault/knowledge/index.md"

# ─── Knowledge-Loop Consumer Activation (Phase C, 2026-05-01) ──────────
# Read by `agents-sdk/scripts/query.py` for two-pass terminal Q&A against
# the knowledge base. `default_model = "auto"` mirrors vault_synthesizer's
# local-first routing — Qwen3-14B on MBP if awake, Anthropic Sonnet 4.6 on
# fallback. `task_key` resolves through routing.task_map for the local leg.
# `manifest_path` is the C.M2 JSONL append target; one line per --file-back
# run captures run_id, question, model, route, consulted articles + chunk
# IDs + similarities, duration, qa_file. CLI flags override these defaults.

[agents.query]
default_model = "auto"
max_articles = 10
selection_max_tokens = 600
answer_max_tokens = 1500
task_key = "vault_synthesis"
qa_dir = "vault/knowledge/qa"
manifest_path = "vault/knowledge/qa/.manifest.json"

# ─── Gemini Deep Research (Phase 1, v3.25.0, 2026-05-03) ────────────────────
# Calls Gemini DR / DR Max via the Interactions API with background polling.
# Used by the gemini-deep-research skill (Phase 2) and gemini_researcher
# agent (Phase 3). Budget caps enforce per-task / daily / monthly limits.
# Real API status values: "in_progress", "completed", "failed", "cancelled".

[gemini]
agent_id_dr = "deep-research-preview-04-2026"
agent_id_max = "deep-research-max-preview-04-2026"
default_tier = "dr"
poll_interval_seconds = 10
max_poll_seconds = 3900                 # 65 min hard wall (Gemini ceiling ~60 min + 5 min cushion)
output_dir = "vault/20_projects/research"
output_anchor = "research-digest"
ledger_dir = "vault/health"

[gemini.budget]
max_per_task_usd = 7.00
monthly_cap_usd = 50.00
daily_cap_usd = 20.00
dr_predicted_usd = 2.00                 # DR tier midpoint (range $1-$4)
max_predicted_usd = 5.00                # DR Max tier midpoint (range $3-$7)
prediction_multiplier = 1.4             # DR predicts $2.80; DR Max predicts $7.00

[agents.gemini_researcher]
# Phase 1: config block only — agent script ships in Phase 3 (v3.27.0).
# Real cap enforcement lives in [gemini.budget] above; max_budget_usd here
# is decorative for fleet-state parity with other agent config blocks.
enabled = false
queue_path = "vault/00_inbox/gemini-research-queue.md"
max_budget_usd = 0.00

[agents.job_feed]
# v1 — daily PM/APM role discovery from free public feeds + ~40-company ATS watchlist.
# Scores survivors via Qwen3-14B on MBP via HybridRouter. fallback_disabled=true
# preserves $0/run cost integrity — MBP-asleep ⇒ scoring deferred, never cloud.
# Schedule: 7 launchd fires 8:00–11:00 AM ET; idempotency in agents/job_feed.py.
enabled = true
max_cost_usd = 0.10
http_timeout_sec = 10
rate_limit_per_host_per_sec = 1
mbp_probe_timeout_sec = 2
mbp_probe_url = "http://seans-macbook-pro.local:1234/v1/models"  # LM Studio on MBP (mDNS — see [routing.machines.macbook_pro])
fetch_skip_if_within_hours = 4
fallback_disabled = true
log_level = "INFO"

[agents.job_feed.paths]
db = "vault/.job-feed.db"
watchlist = "vault/20_projects/prj-job-hunt-2026/job-feed/watchlist.yaml"
roll_up_dir = "vault/20_projects/prj-job-hunt-2026/job-feed"
manifest_dir = "vault/health"

[agents.skill_optimizer]
enabled = true
schedule = "manual"  # not on launchd; run by hand
target_skill_dir = ".claude/skills/writing-voice-modes"
target_skill_md = ".claude/skills/writing-voice-modes/SKILL.md"
branch = "autoresearch/writing-voice-modes-2026-05-09"
generator_model = "claude-opus-4-7"
judge_model_local = "qwen3-14b-research:latest"
judge_model_sonnet_check = "claude-sonnet-4-6"
ollama_base_url = "http://localhost:5050"
sonnet_check_every_n_iterations = 5
max_iterations = 25
plateau_halt_iterations = 3
runs_per_prompt = 15
training_prompts_count = 5
holdout_prompts_count = 2
surprise_prompts_count = 3
surprise_score_every_n_iterations = 5
cost_cap_usd_hard = 200.00
cost_cap_usd_soft = 50.00
results_path = "data/skill-optimizer/writing-voice-modes-results.tsv"
stylometry_baseline_path = "data/skill-optimizer/stylometry_baseline.json"
calibration_set_path = "data/skill-optimizer/calibration_set.jsonl"
evals_path = ".claude/skills/writing-voice-modes/evals.yaml"
evals_sealed_path = ".claude/skills/writing-voice-modes/evals.sealed.yaml"
program_md_path = "lib/skill_optimizer/program.md"
judge_prompt_path = "lib/skill_optimizer/judge_prompt.txt"

[substack_drafter]
enabled = false  # default-disabled per SPEC kill-switch layer 1
max_cost_usd = 0.10  # hard cap per run; Qwen3-14B local is free, Sonnet fallback ~$0.05/draft
output_dir = "vault/20_projects/prj-job-hunt-2026/onwards-and-upwards-5-4-26/substack-drafts"
concepts_lookback_days = 14
references_lookback_days = 30
synthesizer_dry_threshold = 3  # exit no-op if last N synth manifests had concepts_written == 0
draft_word_count_target = 1350  # midpoint of 1200-1500 SPEC range
schedule_day = "Thursday"
schedule_hour = 18
voice_epoch = "2026-05-04"  # Monday of the sprint; rotation index zero
# voice_override = "sedaris"  # uncomment to pin a mode for a specific run

# ─── Local TTS Pipeline (v3.36.0, 2026-05-15) ───────────────────────────
# Verbatim doc-to-audio via Kokoro-82M ONNX. CLI: scripts/doc_to_audio.py.
# Cost: $0/run (pure local ONNX inference). Default host: Mac Mini.
# Model files live under agents-sdk/models/kokoro/ (gitignored, checksum tracked).

[doc_to_audio]
model_path = "agents-sdk/models/kokoro/kokoro-v1.0.onnx"
voices_path = "agents-sdk/models/kokoro/voices-v1.0.bin"
default_voice = "af_heart"
default_speed = 1.0
default_lang = "en-us"
sample_rate = 24000
max_chars_per_chunk = 250
section_silence_ms = 200
output_dir = "vault/90_system/audio"
mp3_quality = 2                          # ffmpeg libmp3lame -qscale:a 2 (~190 kbps VBR)
