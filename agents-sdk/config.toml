[paths]
repo_root = "/Users/seanwinslow/Code-Brain/claude-code-superuser-pack"
vault_root = "/Users/seanwinslow/Code-Brain/claude-code-superuser-pack/vault"
skills_dir = ".claude/skills"
life_systems_scripts = "life-systems/scripts"

[agents.daily_driver]
enabled = true
skills = ["daily-driver", "vault-read-write"]
morning_time = "06:00"
evening_time = "17:00"
weekly_day = "Friday"
weekly_time = "16:00"

[agents.daily_driver.modes.morning]
max_turns = 15
max_budget_usd = 0.25

[agents.daily_driver.modes.evening]
max_turns = 10
max_budget_usd = 0.25

[agents.daily_driver.modes.weekly]
max_turns = 20
max_budget_usd = 0.50

[agents.preserve_session]
enabled = true
skills = ["preserve-session", "vault-read-write"]

[agents.spending_analysis]
enabled = true
skills = ["personal-finance", "subscription-audit", "vault-read-write"]
input_dir = "life-systems/finance"
output_dir = "vault/50_sources/finance"
max_turns = 20
max_budget_usd = 0.25

[agents.process_inbox]
enabled = true
skills = ["process-inbox", "vault-read-write"]
max_turns = 15
max_budget_usd = 0.25
confidence_threshold = 80

[agents.sprint_health]
enabled = true
skills = ["sprint-roadmap", "vault-read-write"]
max_turns = 15
max_budget_usd = 0.50
project_key = "BE"
schedule = "Friday 15:00"

[agents.meeting_defender]
enabled = true
skills = ["meeting-prep", "vault-read-write"]
max_turns = 10
max_budget_usd = 0.25
schedule = "Monday 07:00"

[agents.vault_indexer]
enabled = true
skills = ["vault-read-write"]
max_turns = 20
max_budget_usd = 0.00
schedule = "02:00"
embedding_model = "nomic-embed-text"
target_machine = "mac_mini"

[agents.pr_digest]
enabled = true
skills = ["vault-read-write"]
max_turns = 15
max_budget_usd = 0.00
schedule = "08:00"
repos = ["seanwinslow28/16BitFit-V3", "seanwinslow28/sprite-sheet-automation-2026", "seanwinslow28/claude-code-superuser-pack"]
target_machine = "macbook_pro"

[agents.health_audit]
enabled = false
skills = ["health-habits", "vault-read-write"]

[agents.md_to_anki]
enabled = false
skills = ["vault-read-write"]

[safety]
max_turns_default = 30
max_budget_default = 0.50
permission_mode = "acceptEdits"

[logging]
log_dir = "vault/90_system/agent-logs"
log_level = "INFO"

# ─── Three-Machine Routing ───────────────────────────────────────────

[routing]
health_check_timeout_secs = 3
health_check_interval_secs = 60
fallback_to_api = true

[routing.machines.mac_mini]
host = "192.168.68.200"
port = 11434
tier = 1
runtime = "ollama"
always_on = true
models = ["phi4-mini-reasoning", "phi4-mini", "nomic-embed-text"]

[routing.machines.macbook_pro]
host = "127.0.0.1"
port = 8080
tier = 2
runtime = "mlx-lm"
always_on = false
models = ["Qwen3-14B", "Qwen2.5-Coder-32B", "Qwen3.5"]

[routing.machines.alienware]
host = "192.168.68.201"
port = 11434
tier = 3
runtime = "ollama"
always_on = false
wol_mac = "B4:E9:B8:F7:71:47"
models = ["Qwen3-VL-7B"]

# Task → model → machine mapping
[routing.task_map]
inbox_triage = { model = "phi4-mini-reasoning", machine = "mac_mini" }
vault_embeddings = { model = "nomic-embed-text", machine = "mac_mini" }
anki_cards = { model = "phi4-mini", machine = "mac_mini" }
financial_analysis = { model = "Qwen3-14B", machine = "macbook_pro" }
code_review = { model = "Qwen2.5-Coder-32B", machine = "macbook_pro" }
heavy_synthesis = { model = "Qwen3.5", machine = "macbook_pro" }
sprite_vision_qa = { model = "Qwen3-VL-7B", machine = "alienware" }
comfyui_orchestration = { model = "none", machine = "alienware" }
