# LoRA Training Configuration — 16BitFit Sprite Style
# Framework: kohya_ss (dev branch)
# Base model: Illustrious XL v0.1
# Hardware: RTX 5080 16GB GDDR7
#
# CRITICAL CONSTRAINTS:
# - SDPA attention ONLY (NO xformers — crashes on sm_120)
# - Adafactor optimizer (required for fused backward pass, ~10GB VRAM)
# - kohya_ss DEV BRANCH ONLY (stable doesn't support RTX 5080)
# - Train on Illustrious XL v0.1 (NOT v2.0+ — reduced cross-compatibility)

[model]
pretrained_model_name_or_path = "C:\\Users\\seanw\\Documents\\Code-Brain\\models\\illustriousXL_v01.safetensors"
v2 = false
v_parameterization = false
sdxl = true

[train]
output_dir = "C:\\Users\\seanw\\Documents\\Code-Brain\\lora-output\\16bitfit-style"
output_name = "16bitfit_sprite_style"
save_model_as = "safetensors"
save_precision = "fp16"

# Training duration
max_train_epochs = 10
save_every_n_epochs = 5
sample_every_n_epochs = 5

# Batch settings (VRAM constrained to 16GB)
train_batch_size = 1
gradient_accumulation_steps = 2
gradient_checkpointing = true

# Mixed precision — bf16 native on RTX 5080
mixed_precision = "bf16"
full_fp16 = false
full_bf16 = true

# NOTE: fused_backward_pass only works with sdxl_train.py (full fine-tune),
# NOT with train_network.py (LoRA). Removed after Training Run 001.
# fused_backward_pass = true

# Cache latents to save VRAM during training
cache_latents = true
cache_latents_to_disk = true

[optimizer]
# Adafactor is required for fused backward pass
optimizer_type = "Adafactor"
learning_rate = 5e-4
lr_scheduler = "cosine"
lr_warmup_steps = 0

# UNet only — text_encoder_lr = 0 forces style learning from visual features
network_train_unet_only = true
text_encoder_lr = 0

[network]
# LoRA configuration
network_module = "networks.lora"
network_dim = 32          # rank 32 = sweet spot for style LoRAs (~20-40MB)
network_alpha = 32        # same as rank for 1.0 scaling

[dataset]
train_data_dir = "C:\\Users\\seanw\\Documents\\Code-Brain\\lora-training\\dataset"
resolution = "1024,1024"
enable_bucket = true
bucket_reso_steps = 64
bucket_no_upscale = true
flip_aug = false          # Don't flip sprites — they face RIGHT by convention
color_aug = false         # Don't color augment — we want exact palette learning

[advanced]
# Noise and sampling
min_snr_gamma = 5
noise_offset = 0.03       # Start low for pixel art (less noise = sharper edges)
clip_skip = 1             # Standard for Illustrious XL

# Attention — SDPA ONLY (no xformers on RTX 5080 sm_120)
xformers = false
sdpa = true

# Seed for reproducibility
seed = 42

# Logging
logging_dir = "C:\\Users\\seanw\\Documents\\Code-Brain\\lora-output\\logs"
log_with = "tensorboard"

[sample]
# Sample prompts for monitoring training progress
sample_prompts = "C:\\Users\\seanw\\Documents\\Code-Brain\\lora-training\\sample_prompts.txt"
sample_sampler = "euler"
